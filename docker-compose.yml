services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_CHAT_MODEL: "qwen2.5:7b"
      OLLAMA_EMBED_MODEL: "nomic-embed-text"
      DATABASE_URL: postgresql://postgres:bosbutter%40db@postgres:5432/bos_butter
    volumes:
      - ./backend:/app/backend
    command: uvicorn chatbot.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      ollama:
        condition: service_started
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      FASTAPI_BASE_URL: "http://backend:8000"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-bos_butter}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bosbutter@db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    depends_on:
      - ollama  # Optional, if needed

  auth-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.node
    working_dir: /app/backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:bosbutter%40db@postgres:5432/bos_butter
      JWT_SECRET: MY_SUPER_SECRET_KEY_KEVWEB
      PORT: 5000
    volumes:
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ollama:
  postgres_data:
