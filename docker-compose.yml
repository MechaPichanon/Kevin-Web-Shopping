services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_CHAT_MODEL: "qwen2.5:7b"
      OLLAMA_EMBED_MODEL: "bge-m3"
      DATABASE_URL: postgresql://postgres:bosbutter%40db@postgres:5432/bos_butter
    volumes:
      - ./backend:/app/backend
    command: uvicorn chatbot.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      FASTAPI_BASE_URL: "http://backend:8000"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000"
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ${DB_NAME:-bos_butter}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bosbutter@db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/migrations:/migrations:ro

  auth-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.node
    working_dir: /app/backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:bosbutter%40db@postgres:5432/bos_butter
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_EMBED_MODEL: "bge-m3"
      JWT_SECRET: MY_SUPER_SECRET_KEY_KEVWEB
      PORT: 5000
    volumes:
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
